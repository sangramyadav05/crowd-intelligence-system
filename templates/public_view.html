<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowd Intelligence System | Public View</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <main class="stack">
      <section class="card">
        <h1 class="page-title">Public Crowd Status View</h1>
        <p class="page-subtitle">Use this page to understand live zone conditions before moving around the venue.</p>
        <h2>{{ event["name"] }}</h2>
        <p>Event Code: {{ event["event_code"] }}</p>
      </section>

      <section class="card">
        <h2>Live Zone Status</h2>
        <div id="zones-container" class="zone-grid"></div>
        <p id="zones-empty" class="muted">No zones available yet.</p>
      </section>
    </main>

    <script>
      const eventId = {{ event["id"] }};
      const zonesContainer = document.getElementById("zones-container");
      const emptyMessage = document.getElementById("zones-empty");

      function renderZones(zones) {
        zonesContainer.innerHTML = "";

        if (!zones.length) {
          emptyMessage.style.display = "block";
          return;
        }

        emptyMessage.style.display = "none";

        zones.forEach((zone) => {
          const zoneCard = document.createElement("article");

          zoneCard.className = "card";
          zoneCard.innerHTML = `
            <h3>${zone.zone_name}</h3>
            <p>
              Status:
              <span class="status-badge status-${zone.public_color}">
                ${zone.public_status}
              </span>
            </p>
            <p>Live Count: ${zone.current_count}</p>
            <p>Capacity: ${zone.capacity}</p>
          `;

          zonesContainer.appendChild(zoneCard);
        });
      }

      async function refreshZones() {
        const response = await fetch(`/api/public_zones/${eventId}`);
        const data = await response.json();
        renderZones(data.zones || []);
      }

      refreshZones();
      setInterval(refreshZones, 3000);
    </script>
  </body>
</html>
