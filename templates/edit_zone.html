{% extends "base.html" %}

{% block title %}Crowd Intelligence System | Edit Zone{% endblock %}

{% block content %}
<section class="hero">
  <div>
    <span class="eyebrow">Zone Setup</span>
    <h1 class="page-title">Edit zone</h1>
    <p class="page-subtitle">
      Adjust naming and capacity while keeping live occupancy under the new limit.
    </p>
  </div>
</section>

<section class="card form-card">
  <h2 class="section-title">{{ event["name"] }}</h2>
  <form method="post">
    <div class="field">
      <label for="zone_name">Zone Name</label>
      <input id="zone_name" type="text" name="zone_name" value="{{ zone['zone_name'] }}" required />
    </div>
    <div class="field">
      <label for="capacity">Capacity</label>
      <input id="capacity" type="number" min="1" name="capacity" value="{{ zone['capacity'] }}" required />
    </div>
    <button type="submit">Save Zone</button>
  </form>
</section>
{% endblock %}
