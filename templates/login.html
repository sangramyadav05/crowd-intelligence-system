<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowd Intelligence System | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <span class="eyebrow">Organizer Access</span>
      <h1 class="page-title">Login</h1>
      <p class="page-subtitle">
        Access the operational dashboard to manage events, zones, and live crowd alerts.
      </p>
      {% if error %}
      <p class="notice">{{ error }}</p>
      {% endif %}
      <form method="post">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter your password"
          />
        </div>
        <button type="submit">Login</button>
      </form>
      <p><a class="inline-link" href="{{ url_for('register') }}">Create an account</a></p>
    </main>
  </body>
</html>
