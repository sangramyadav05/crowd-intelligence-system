<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowd Intelligence System | Create Event</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <span class="eyebrow">Event Setup</span>
      <h1 class="page-title">Create Event</h1>
      <p class="page-subtitle">
        Start a new event workspace and generate a public event code for guests.
      </p>
      {% if error %}
      <p class="notice">{{ error }}</p>
      {% endif %}
      <form method="post">
        <div class="field">
          <label for="name">Event Name</label>
          <input id="name" name="name" type="text" placeholder="Enter event name" />
        </div>
        <button type="submit">Create Event</button>
      </form>
      <p><a class="inline-link" href="{{ url_for('dashboard') }}">Back to dashboard</a></p>
    </main>
  </body>
</html>
