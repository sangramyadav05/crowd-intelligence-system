{% extends "base.html" %}

{% block title %}Crowd Intelligence System | Register{% endblock %}

{% block content %}
<section class="hero">
  <div>
    <span class="eyebrow">Organizer Access</span>
    <h1 class="page-title">Create organizer account</h1>
    <p class="page-subtitle">
      Set up an organizer profile to manage events, zones, and live crowd operations.
    </p>
  </div>
</section>

<section class="card form-card">
  <h2 class="section-title">Register</h2>
  <form method="post">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" required />
    </div>
    <button type="submit">Create Account</button>
  </form>
  <p class="section-copy">
    Already registered? <a class="inline-link" href="{{ url_for('auth.login') }}">Log in</a>
  </p>
</section>
{% endblock %}
