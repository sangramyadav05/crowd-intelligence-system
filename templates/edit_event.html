{% extends "base.html" %}

{% block title %}Crowd Intelligence System | Edit Event{% endblock %}

{% block content %}
<section class="hero">
  <div>
    <span class="eyebrow">Event Setup</span>
    <h1 class="page-title">Edit event</h1>
    <p class="page-subtitle">
      Update the event name while preserving the event code and linked zones.
    </p>
  </div>
</section>

<section class="card form-card">
  <h2 class="section-title">Event details</h2>
  <form method="post">
    <div class="field">
      <label for="name">Event Name</label>
      <input id="name" type="text" name="name" value="{{ event['name'] }}" required />
    </div>
    <button type="submit">Save Changes</button>
  </form>
</section>
{% endblock %}
