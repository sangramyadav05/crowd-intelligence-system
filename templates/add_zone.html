{% extends "base.html" %}

{% block title %}Crowd Intelligence System | Add Zone{% endblock %}

{% block content %}
<section class="hero">
  <div>
    <span class="eyebrow">Zone Setup</span>
    <h1 class="page-title">Add zone to {{ event["name"] }}</h1>
    <p class="page-subtitle">
      Create operational zones with capacity limits so live crowd pressure can be tracked.
    </p>
  </div>
</section>

<section class="card form-card">
  <h2 class="section-title">Zone configuration</h2>
  <form method="post">
    <div class="field">
      <label for="zone_name">Zone Name</label>
      <input id="zone_name" type="text" name="zone_name" required />
    </div>
    <div class="field">
      <label for="capacity">Capacity</label>
      <input id="capacity" type="number" min="1" name="capacity" required />
    </div>
    <button type="submit">Add Zone</button>
  </form>
</section>
{% endblock %}
