<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowd Intelligence System | Add Zone</title>
  </head>
  <body>
    <main>
      <h1>Add Zone</h1>
      <p>Event: {{ event["name"] }} ({{ event["event_code"] }})</p>
      {% if error %}
      <p>{{ error }}</p>
      {% endif %}
      <form method="post">
        <div>
          <label for="zone_name">Zone Name</label>
          <input id="zone_name" name="zone_name" type="text" placeholder="Enter zone name" />
        </div>
        <div>
          <label for="capacity">Capacity</label>
          <input id="capacity" name="capacity" type="number" min="0" placeholder="Enter capacity" />
        </div>
        <button type="submit">Add Zone</button>
      </form>
      <p><a href="{{ url_for('event_detail', event_id=event['id']) }}">Back to event</a></p>
    </main>
  </body>
</html>
