<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowd Intelligence System | Event Detail</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <main class="stack">
      <section class="card">
        <h1 class="page-title">Organizer Event Control Panel</h1>
        <p class="page-subtitle">Track live occupancy, review alert severity, and manage zones for this event.</p>
        <h2>{{ event["name"] }}</h2>
        <p>Event Code: {{ event["event_code"] }}</p>
        <p><a class="button-link" href="{{ url_for('add_zone', event_id=event['id']) }}">Add Zone</a></p>
      </section>

      <section class="card">
        <h2>Zone Alerts</h2>
        <div id="zones-container" class="zone-grid"></div>
        <p id="zones-empty" class="muted">No zones added yet.</p>
      </section>

      <p><a class="inline-link" href="{{ url_for('dashboard') }}">Back to dashboard</a></p>
    </main>

    <script>
      const eventId = {{ event["id"] }};
      const zonesContainer = document.getElementById("zones-container");
      const emptyMessage = document.getElementById("zones-empty");

      function renderZones(zones) {
        zonesContainer.innerHTML = "";

        if (!zones.length) {
          emptyMessage.style.display = "block";
          return;
        }

        emptyMessage.style.display = "none";

        zones.forEach((zone) => {
          const zoneCard = document.createElement("article");

          zoneCard.className = "card";
          zoneCard.innerHTML = `
            <h3>${zone.zone_name}</h3>
            <p>Current Count: ${zone.current_count}</p>
            <p>Capacity: ${zone.capacity}</p>
            <p>
              Alert:
              <span class="status-badge status-${zone.organizer_color}">
                ${zone.organizer_alert}
              </span>
            </p>
          `;

          zonesContainer.appendChild(zoneCard);
        });
      }

      async function refreshZones() {
        await fetch(`/api/update_crowd/${eventId}`);
        const response = await fetch(`/api/get_zones/${eventId}`);
        const data = await response.json();
        renderZones(data.zones || []);
      }

      refreshZones();
      setInterval(refreshZones, 3000);
    </script>
  </body>
</html>
