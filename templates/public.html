{% extends "base.html" %}

{% block title %}Crowd Intelligence System | Public Lookup{% endblock %}

{% block content %}
<section class="hero">
  <div>
    <span class="eyebrow">Public Access</span>
    <h1 class="page-title">Check live event status</h1>
    <p class="page-subtitle">
      Enter the event code provided by the organizer to see live zone safety guidance.
    </p>
  </div>
</section>

<section class="card form-card">
  <h2 class="section-title">Event code lookup</h2>
  <form method="post">
    <div class="field">
      <label for="event_code">Event Code</label>
      <input id="event_code" type="text" name="event_code" maxlength="6" required />
    </div>
    <button type="submit">View Status</button>
  </form>
</section>
{% endblock %}
