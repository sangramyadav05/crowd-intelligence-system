<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowd Intelligence System | Public Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <span class="eyebrow">Guest Access</span>
      <h1 class="page-title">Public Event Access</h1>
      <p class="page-subtitle">
        Enter an event code to view live zone crowd conditions and make safer movement
        decisions.
      </p>
      {% if error %}
      <p class="notice">{{ error }}</p>
      {% endif %}
      <form method="post">
        <div class="field">
          <label for="event_code">Event Code</label>
          <input
            id="event_code"
            name="event_code"
            type="text"
            maxlength="6"
            placeholder="Enter event code"
          />
        </div>
        <button type="submit">View Event Status</button>
      </form>
    </main>
  </body>
</html>
